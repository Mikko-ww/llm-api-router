# ============================================================================
# Agent Merge Policy Workflow
# ============================================================================
# 作用:
# - 根据计划声明等级与改动文件规则，计算 task PR 的最终风险等级（L1/L2/L3）。
# 触发:
# - workflow_dispatch（通常由 trigger-ci.js 调用）。
# 输入:
# - pr_number, parent_issue, task_key。
# 执行:
# - evaluate-merge-policy.js 对比 plan task level 与 merge_policy globs
# - 给 PR 添加风险/类型标签并写入评估评论
# - 当 can_auto_merge=true 时执行 auto-merge-l1.js
# ============================================================================

name: Agent Merge Policy
run-name: "Agent Merge Policy • PR #${{ inputs.pr_number }} • Task ${{ inputs.task_key }}"

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Pull request number'
        required: true
        type: string
      parent_issue:
        description: 'Parent issue number'
        required: true
        type: string
      task_key:
        description: 'Task key'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd .github/scripts && npm install

      - name: Normalize inputs
        id: normalize
        shell: bash
        run: |
          pr_number='${{ inputs.pr_number }}'
          parent_issue='${{ inputs.parent_issue }}'

          if ! [[ "$pr_number" =~ ^[1-9][0-9]*$ ]]; then
            echo "::error::pr_number must be a positive integer, got: $pr_number"
            exit 1
          fi

          if ! [[ "$parent_issue" =~ ^[1-9][0-9]*$ ]]; then
            echo "::error::parent_issue must be a positive integer, got: $parent_issue"
            exit 1
          fi

          echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"
          echo "parent_issue=$parent_issue" >> "$GITHUB_OUTPUT"

      - name: Evaluate merge policy
        id: evaluate
        run: node .github/scripts/evaluate-merge-policy.js
        env:
          AGENT_GH_TOKEN: ${{ secrets.AGENT_GH_TOKEN }}
          PR_NUMBER: ${{ steps.normalize.outputs.pr_number }}
          PARENT_ISSUE: ${{ steps.normalize.outputs.parent_issue }}
          TASK_KEY: ${{ inputs.task_key }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Enable auto-merge for L1
        if: steps.evaluate.outputs.can_auto_merge == 'true'
        run: node .github/scripts/auto-merge-l1.js
        env:
          AGENT_GH_TOKEN: ${{ secrets.AGENT_GH_TOKEN }}
          PR_NUMBER: ${{ steps.normalize.outputs.pr_number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
